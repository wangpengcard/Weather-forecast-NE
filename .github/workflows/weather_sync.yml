name: Corn Pest-Disease Weather Sync

on:
  schedule:
    # 每天早上6点和下午18点各采集一次（UTC时间，北京时间+8）
    # 6:00 UTC = 14:00 北京时间，18:00 UTC = 02:00 北京时间
    - cron: '0 6,18 * * *'
  workflow_dispatch: # 保留手动触发功能

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests pytz

    - name: Configure Git
      run: |
        git config --local user.email "bot@github.com"
        git config --local user.name "github-actions[bot]"

    - name: Pull latest changes
      run: |
        git pull --rebase origin main

    - name: Run fetch_daily.py
      env:
        OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
      run: python fetch_daily.py

    - name: Commit and Push changes
      run: |
        git add .
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update weather data: $(date +'%Y-%m-%d %H:%M')"
          git push origin main
        fi
